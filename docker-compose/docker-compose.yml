services:
  # ─── Order Database (SQL Server) ────────────────────────────────────────────
  order-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: order-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - order-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ─── Catalog Database (SQL Server) ──────────────────────────────────────────
  catalog-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: catalog-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1434:1433"
    volumes:
      - catalog-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ─── Inventory Database (SQL Server) ────────────────────────────────────────
  inventory-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: inventory-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1435:1433"
    volumes:
      - inventory-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ─── Kafka (KRaft mode — no Zookeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Kafka UI (development tool) ────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "9090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Order Migration Runner ─────────────────────────────────────────────────
  order-migration:
    build:
      context: ../api
      dockerfile: Services/Order/Order.MigrationRunner/Dockerfile
    container_name: order-migration
    environment:
      ConnectionStrings__DefaultConnection: "Server=order-db,1433;Database=OrderDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
    depends_on:
      order-db:
        condition: service_healthy
    restart: "no"

  # ─── Catalog Migration Runner ────────────────────────────────────────────────
  catalog-migration:
    build:
      context: ../api
      dockerfile: Services/Catalog/Catalog.MigrationRunner/Dockerfile
    container_name: catalog-migration
    environment:
      ConnectionStrings__DefaultConnection: "Server=catalog-db,1433;Database=CatalogDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
    depends_on:
      catalog-db:
        condition: service_healthy
    restart: "no"

  # ─── Inventory Migration Runner ─────────────────────────────────────────────
  inventory-migration:
    build:
      context: ../api
      dockerfile: Services/Inventory/Inventory.MigrationRunner/Dockerfile
    container_name: inventory-migration
    environment:
      ConnectionStrings__DefaultConnection: "Server=inventory-db,1433;Database=InventoryDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
    depends_on:
      inventory-db:
        condition: service_healthy
    restart: "no"

  # ─── Order Service ──────────────────────────────────────────────────────────
  order-api:
    build:
      context: ../api
      dockerfile: Services/Order/Order.Api/Dockerfile
    container_name: order-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=order-db,1433;Database=OrderDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Keycloak__Authority: "http://keycloak:8080/realms/order-management"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__GroupId: "order-service-group"
    ports:
      - "8081:8080"
    depends_on:
      order-migration:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./logs/order:/app/logs
    restart: unless-stopped

  # ─── Catalog Service ────────────────────────────────────────────────────────
  catalog-api:
    build:
      context: ../api
      dockerfile: Services/Catalog/Catalog.Api/Dockerfile
    container_name: catalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=catalog-db,1433;Database=CatalogDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Keycloak__Authority: "http://keycloak:8080/realms/order-management"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__GroupId: "catalog-service-group"
    ports:
      - "8082:8080"
    depends_on:
      catalog-migration:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./logs/catalog:/app/logs
    restart: unless-stopped

  # ─── Inventory Service ──────────────────────────────────────────────────────
  inventory-api:
    build:
      context: ../api
      dockerfile: Services/Inventory/Inventory.Api/Dockerfile
    container_name: inventory-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=inventory-db,1433;Database=InventoryDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Keycloak__Authority: "http://keycloak:8080/realms/order-management"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__GroupId: "inventory-service-group"
    ports:
      - "8083:8080"
    depends_on:
      inventory-migration:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./logs/inventory:/app/logs
    restart: unless-stopped

  # ─── API Gateway (YARP) ─────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../api
      dockerfile: Gateway/ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      Keycloak__Authority: "http://keycloak:8080/realms/order-management"
      Keycloak__ClientId: "order-management-api"
      ReverseProxy__Clusters__order-cluster__Destinations__order-api__Address: "http://order-api:8080"
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog-api__Address: "http://catalog-api:8080"
      ReverseProxy__Clusters__inventory-cluster__Destinations__inventory-api__Address: "http://inventory-api:8080"
    ports:
      - "8080:8080"
    depends_on:
      order-api:
        condition: service_started
      catalog-api:
        condition: service_started
      inventory-api:
        condition: service_started
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  # ─── React UI ───────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: order-ui
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ─── Keycloak Database (PostgreSQL) ───────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak}"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak}"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_HTTP_PORT: 8080
      JAVA_OPTS_KC_HEAP: "-XX:MaxRAMPercentage=50.0 -XX:InitialRAMPercentage=25.0"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/9000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  order-db-data:
  catalog-db-data:
  inventory-db-data:
  kafka-data:
  keycloak-db-data:
