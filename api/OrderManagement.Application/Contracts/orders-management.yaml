openapi: "3.1.0"

info:
  title: Order Management API — Commands
  version: "1.0"
  description: Write operations (place, confirm, ship, deliver, cancel)

servers:
  - url: http://localhost:5072
    description: Local development

tags:
  - name: Orders

paths:
  /api/orders:
    post:
      tags: [ Orders ]
      operationId: PlaceOrder
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Domain rule violation or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/orders/{id}:
    delete:
      tags: [ Orders ]
      operationId: DeleteOrder
      summary: Soft-delete an order
      description: |
        Soft-deletes the order. If the order is still **Pending**, stock is restored
        for all items atomically in the same transaction. Orders in other states are
        deleted without stock adjustment.
      parameters:
        - $ref: "#/components/parameters/OrderId"
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Order deleted successfully
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires `order:delete` permission

  /api/orders/{id}/deliver:
    post:
      tags: [ Orders ]
      operationId: DeliverOrder
      summary: Mark order as delivered
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
        "409":
          description: Invalid order state or concurrency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/orders/{id}/confirm:
    
    post:
      tags: [ Orders ]
      operationId: ConfirmOrder
      summary: Confirm a pending order
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
        "409":
          description: Invalid order state or concurrency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/orders/{id}/ship:
    post:
      tags: [ Orders ]
      operationId: ShipOrder
      summary: Mark order as shipped
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order shipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
        "409":
          description: Invalid order state or concurrency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/orders/{id}/cancel:
    post:
      tags: [ Orders ]
      operationId: CancelOrder
      summary: Cancel an order
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
        "409":
          description: Invalid order state or concurrency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    OrderStatus:
      type: string
      enum:
        - Pending
        - Confirmed
        - Processing
        - Shipped
        - Delivered
        - Cancelled

    AddressDto:
      type: object
      required: [ street, city, province, zipCode ]
      properties:
        street:
          type: string
          maxLength: 200
        city:
          type: string
          maxLength: 100
        province:
          type: string
          maxLength: 100
        zipCode:
          type: string
          maxLength: 20

    PlaceOrderRequest:
      type: object
      required: [ customerId, shippingAddress, lines ]
      properties:
        customerId:
          type: string
          format: uuid
        shippingAddress:
          $ref: "#/components/schemas/AddressDto"
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLineRequest"
        notes:
          type: [ string, "null" ]
          maxLength: 2000

    OrderLineRequest:
      type: object
      required: [ productId, quantity ]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    CancelOrderRequest:
      type: object
      required: [ reason ]
      properties:
        reason:
          type: string
          minLength: 1

    OrderResponse:
      type: object
      required: [ id, orderNumber, status, totalAmount, currency, shippingAddress, createdAt, items ]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        totalAmount:
          type: number
          format: decimal
        currency:
          type: string
          maxLength: 3
        shippingAddress:
          $ref: "#/components/schemas/AddressDto"
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"

    OrderItemResponse:
      type: object
      required: [ productId, productName, unitPrice, currency, quantity, lineTotal ]
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        unitPrice:
          type: number
          format: decimal
        currency:
          type: string
          maxLength: 3
        quantity:
          type: integer
        lineTotal:
          type: number
          format: decimal

    ProblemDetails:
      type: object
      properties:
        statusCode:
          type: integer
        title:
          type: string
        detail:
          type: string
        traceId:
          type: string
        stackTrace:
          type: [ string, "null" ]