openapi: "3.1.0"

info:
  title: Product Management API — Commands
  version: "1.0"
  description: Write operations (create, update, delete)

servers:
  - url: http://localhost:5072
    description: Local development

tags:
  - name: Products

paths:
  /api/products:
    post:
      tags: [ Products ]
      operationId: CreateProduct
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/products/{id}:
    put:
      tags: [ Products ]
      operationId: UpdateProduct
      summary: Update product name or price
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Product not found
        "409":
          description: Domain rule violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

    delete:
      tags: [ Products ]
      operationId: DeleteProduct
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Product deleted
        "404":
          description: Product not found

components:
  schemas:
    CreateProductRequest:
      type: object
      required: [ name, sku, price, currency ]
      properties:
        name:
          type: string
          maxLength: 200
        sku:
          type: string
          maxLength: 50
        price:
          type: number
          format: decimal
        currency:
          type: string
          maxLength: 3
          default: USD
        initialStockQuantity:
          type: [ integer, "null" ]
          minimum: 0
          description: Initial on-hand stock seeded into Inventory when the product is created.
        description:
          type: [ string, "null" ]
          maxLength: 1000

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: [ string, "null" ]
          maxLength: 200
        price:
          type: [ number, "null" ]
          format: decimal
          exclusiveMinimum: 0
        currency:
          type: [ string, "null" ]
          maxLength: 3

    ProductResponse:
      type: object
      required: [ id, name, sku, price, currency ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          type: number
          format: decimal
        currency:
          type: string

    ProblemDetails:
      type: object
      properties:
        statusCode:
          type: integer
        title:
          type: string
        detail:
          type: string
        traceId:
          type: string
        stackTrace:
          type: [ string, "null" ]
